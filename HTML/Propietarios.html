<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbano Hogar - Propietarios</title>
    <link rel="stylesheet" href="../CSS/Estilos-Propiedades.css">
    <link rel="icon" href="../IMG/Logo.png">
</head>
<body>
    <div class="Contenedor">
        <header>
            <div class="logo">
                <img src="../IMG/Logo 2.png" alt="Logo Urbano Hogar">
            </div>
            <div class="titulo">
                <h1>Urbano Hogar</h1>
                <h2>Tu aliado en arrendamientos inmobiliarios</h2>
            </div>

            <nav>
                <ul>
                    <li><a href="../HTML/index.html">Inicio</a></li>
                    <li><a href="../HTML/Inmuebles.html">Inmuebles</a></li>
                                        <li class="dropdown">
                                            <button class="dropbtn" aria-expanded="false">Usuarios ▾</button>
                                            <ul class="dropdown-content" aria-label="submenu">
                                                <li><a href="../HTML/Propietarios.html">Propietarios</a></li>
                                                <li><a href="../HTML/Admin.html">Admin</a></li>
                                            </ul>
                                        </li>
                                        <li><a href="../HTML/contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <h1 class="tituloLogin">Acceso para Propietarios</h1>

            <div class="contenedorMenu">
                <h2 class="tituloForm">Iniciar Sesión</h2>

                <form id="formLogin">
                    <div class="group">
                        <label for="usuario">Usuario</label>
                        <input type="text" id="usuario" placeholder="Correo o ID">
                    </div>

                    <div class="group">
                        <label for="clave">Contraseña</label>
                        <input type="password" id="clave" placeholder="••••••••">
                    </div>

                    <button type="submit">Ingresar</button>
                </form>

                <p id="mensajeLogin" style="color:red; font-weight:bold;"></p>
            </div>
        </main>

        <footer>
            <p>&copy; 2025 Urbano Hogar. Todos los derechos reservados.</p>
        </footer>
    </div>

    <script>
document.getElementById("formLogin").addEventListener("submit", (e) => {
  e.preventDefault();
  const usuario = document.getElementById("usuario").value;
  const clave = document.getElementById("clave").value;

  if (usuario === "admin@urbano.com" && clave === "1234") {
    localStorage.setItem("usuarioActivo", usuario);
    window.location.href = "../HTML/inmueble2.html";
  } else {
    document.getElementById("mensajeLogin").textContent = "Credenciales inválidas";
  }
});
</script>


    <script src="../Js/inmueble.js"></script>
</body>
</html>
